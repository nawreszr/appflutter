version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: etudiants_db
      POSTGRES_USER: etudiants_user
      POSTGRES_PASSWORD: etudiants_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - etudiants_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etudiants_user -d etudiants_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Étudiant Service
  etudiant-service:
    build:
      context: ./api-spring-boot
      dockerfile: Dockerfile
    container_name: etudiant_service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/etudiants_db
      SPRING_DATASOURCE_USERNAME: etudiants_user
      SPRING_DATASOURCE_PASSWORD: etudiants_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SPRING_APPLICATION_NAME: etudiant-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on:
      - db
      - eureka-server
    networks:
      - etudiants_network
    restart: unless-stopped

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka_server
    ports:
      - "8761:8761"
    networks:
      - etudiants_network
    restart: unless-stopped

  grading-service:
    build:
      context: ./grading-service
      dockerfile: Dockerfile
    container_name: grading_service
    ports:
      - "8082:8082"
    environment:
      SPRING_APPLICATION_NAME: grading-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on:
      - db
      - eureka-server
    networks:
      - etudiants_network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
      - etudiant-service
      - grading-service
    networks:
      - etudiants_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_app
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - etudiants_network
    restart: unless-stopped

networks:
  etudiants_network:
    driver: bridge

volumes:
  postgres_data:
