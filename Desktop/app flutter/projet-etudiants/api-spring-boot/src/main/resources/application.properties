spring.application.name=etudiant-service

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://db:5432/etudiants_db
spring.datasource.username=etudiants_user
spring.datasource.password=etudiants_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8081
server.servlet.context-path=/

# Logging
logging.level.root=INFO
logging.level.com.etudiants=DEBUG
