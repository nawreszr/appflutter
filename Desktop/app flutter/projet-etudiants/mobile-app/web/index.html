<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Étudiants</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .loader {
            text-align: center;
            padding: 40px 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 20px;
            border-radius: 5px;
            margin: 20px;
            text-align: center;
        }
        
        .list-container {
            padding: 20px;
        }
        
        .etudiant-card {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .etudiant-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .etudiant-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .etudiant-info {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        
        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            background: #f5f5f5;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Liste des Étudiants</h1>
            <p>Affichage en temps réel</p>
        </div>
        
        <div id="content" class="list-container">
            <div class="loader">
                <div class="spinner"></div>
                <p style="margin-top: 20px; color: #666;">Chargement...</p>
            </div>
        </div>
        
        <div class="footer">
            © 2026 Projet Étudiants
        </div>
    </div>
    
    <script>
        // Configuration
        const API_URL = 'http://localhost:8080/api/etudiants';
        
        // Fonction pour charger les étudiants
        async function loadEtudiants() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const etudiants = await response.json();
                displayEtudiants(etudiants);
            } catch (error) {
                displayError(error.message);
            }
        }
        
        // Fonction pour afficher les étudiants
        function displayEtudiants(etudiants) {
            const contentDiv = document.getElementById('content');
            
            if (etudiants.length === 0) {
                contentDiv.innerHTML = '<div class="no-data">Aucun étudiant trouvé</div>';
                return;
            }
            
            contentDiv.innerHTML = etudiants.map((etudiant, index) => `
                <div class="etudiant-card">
                    <div class="etudiant-name">${index + 1}. ${etudiant.nom}</div>
                    <div class="etudiant-info">
                        <div><strong>CIN:</strong> ${etudiant.cin}</div>
                        <div><strong>Date de naissance:</strong> ${formatDate(etudiant.dateNaissance)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // Fonction pour formater la date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            try {
                const date = new Date(dateString + 'T00:00:00');
                return date.toLocaleDateString('fr-FR');
            } catch (e) {
                return dateString;
            }
        }
        
        // Fonction pour afficher les erreurs
        function displayError(message) {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = `<div class="error">Erreur: ${message}</div>`;
        }
        
        // Charger les étudiants au démarrage
        window.addEventListener('load', loadEtudiants);
        
        // Rafraîchir toutes les 5 secondes
        setInterval(loadEtudiants, 5000);
    </script>
</body>
</html>
