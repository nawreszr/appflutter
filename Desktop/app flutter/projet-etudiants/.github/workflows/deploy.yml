name: Deploy

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push all images
        run: |
          services=("api-spring-boot" "eureka-server" "api-gateway" "grading-service" "frontend")
          for service in "${services[@]}"; do
            docker buildx build \
              --push \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-$service:latest \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-$service:${{ github.ref_name }} \
              ./$service
          done
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref_name }}
          body: |
            Docker images built and pushed to registry.
            
            Service images:
            - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api-spring-boot:${{ github.ref_name }}
            - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-eureka-server:${{ github.ref_name }}
            - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api-gateway:${{ github.ref_name }}
            - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-grading-service:${{ github.ref_name }}
            - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.ref_name }}
          draft: false
          prerelease: false
